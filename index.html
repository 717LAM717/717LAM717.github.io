<script>
  const posts = [
    {title: "第一篇文章", url: "posts/post1.html"},
  ];

  const list = document.getElementById("post-list");

  posts.forEach(post => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = post.url;
    a.textContent = post.title;
    li.appendChild(a);
    list.appendChild(li);
  });
</script>
