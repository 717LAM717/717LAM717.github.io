<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的書店日誌</title>
</head>
<body>

<h1>📚 我的書店日誌</h1>

<p>歡迎來到我的書店世界，這裡記錄書的流動與故事。</p>

<h2>文章列表</h2>
<div id="post-list">
  <!-- JavaScript 會自動生成文章連結 -->
</div>

<script>

  const posts = [
  {
    title: "第一篇文章",
    url: "posts/post1.html",
    date: "2026-04-06"
  }
];

const list = document.getElementById("post-list");

posts.forEach(post => {
  const div = document.createElement("div");

  div.innerHTML = `
    <a href="${post.url}">
      <h3>${post.title}</h3>
    </a>
    <p>${post.date}</p>
  `;

  list.appendChild(div);
});
</script>

</body>
</html>
